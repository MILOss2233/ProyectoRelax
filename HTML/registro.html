<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrarse - Relax Hogar</title>

    <link rel="stylesheet" href="../CSS/registro.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="registro-wrapper">

        <!-- FORMULARIO -->
        <div class="registro-box">
            <h2>Registrarse</h2>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </div>

            <div class="input-group">
                <label>Nombre de usuario</label>
                <input type="text" id="usuario" placeholder="Nombre de usuario">
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="Contraseña">
                <small>Mínimo 8 caracteres</small>
            </div>

            <div class="input-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmar" placeholder="Confirmar contraseña">
            </div>
<!-- PRUEBA NO SOY UN ROBOT -->
<div class="input-group robot-check">
    <label class="robot-label">
        <input type="checkbox" id="robot">
        <span>No soy un robot</span>
    </label>
</div>

<button class="btn-registrar" onclick="registrar()">Registrarse</button>
            <!-- LOADER -->
            <div class="loader" id="loader"></div>

            <p class="login-text">
                ¿Ya tienes cuenta? <a href="../HTML/login.html">Inicia sesión</a>
            </p>
        </div>

        <!-- IMAGEN -->
        <div class="registro-img-space">
            <img src="../IMAGENES/adorable-ilustracion-oveja-acuarela_137871-564.avif">
        </div>

    </div>

</div>

<script src="../JS/registro.js"></script>
<script src="../JS/sesion.js"></script>

</body>
</html>
