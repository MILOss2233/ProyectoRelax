<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Relax Hogar</title>

    <link rel="stylesheet" href="../CSS/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">

    <!-- LOGIN -->
    <div class="login-box">
        <h2>Iniciar Sesión</h2>

        <div class="input-group">
            <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png">
            <input type="text" id="usuario" placeholder="Usuario">
        </div>

        <div class="input-group">
            <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">
            <input type="password" id="password" placeholder="Contraseña">
        </div>

        <div class="captcha">
            <input type="checkbox" id="robot">
            <label>No soy un robot</label>
        </div>

        <button class="login-btn" onclick="login()">Iniciar sesión</button>

        <!-- LOADING -->
        <div class="loader" id="loader"></div>

        <p class="register-text">
            ¿No tienes cuenta? <a href="../HTML/registro.html">Regístrate aquí</a>
        </p>
    </div>

    <!-- IMAGEN -->
    <div class="image-box">
        <img src="../IMAGENES/adorable-ilustracion-oveja-acuarela_137871-564.avif">
    </div>

</div>

<script src="../JS/login.js" defer></script>
<script src="../JS/sesion.js" defer></script>

</body>
</html>
